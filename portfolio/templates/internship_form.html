{% extends 'base.html' %}

{% block content %}
<section style="padding-top: 10rem;">
    <div class="container text-center">
        <span class="badge">Internship</span>
        <h2>{{ title }}</h2>

        <div class="form-container" style="margin-top: 3rem;">
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="input-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div style="color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem;">{{ field.errors|striptags }}
                    </div>
                    {% endif %}
                </div>
                {% endfor %}

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Internship</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary"
                        style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
